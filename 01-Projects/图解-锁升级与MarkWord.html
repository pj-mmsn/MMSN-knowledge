<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>synchronized 锁升级 & Mark Word 图解</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#020617;color:#e2e8f0;font-family:'JetBrains Mono',monospace;padding:40px}
.container{max-width:1100px;margin:0 auto}
.header{display:flex;align-items:center;gap:12px;margin-bottom:32px}
.dot{width:10px;height:10px;border-radius:50%;background:#fbbf24;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
h1{font-size:1.8rem;font-weight:700}
h2{font-size:1.1rem;color:#94a3b8;font-weight:400}
.card{background:#0f172a;border:1px solid #1e293b;border-radius:12px;padding:32px;margin-bottom:24px}
.card-title{font-size:1rem;font-weight:600;color:#fbbf24;margin-bottom:20px}
svg{display:block;width:100%}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="dot"></div>
    <div>
      <h1>synchronized 锁升级 &amp; Mark Word 内部结构</h1>
      <h2>无锁 → 偏向锁 → 轻量级锁 → 重量级锁  ·  JDK 1.6+ 锁优化</h2>
    </div>
  </div>

  <!-- Lock upgrade flow -->
  <div class="card">
    <div class="card-title">🔓→🔒 锁升级完整路径</div>
    <svg viewBox="0 0 1060 400">
      <rect width="1060" height="400" fill="#0f172a" rx="8"/>
      <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
        <path d="M40 0L0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
      </pattern>
      <rect width="1060" height="400" fill="url(#grid)"/>

      <!-- State boxes -->
      <!-- No lock -->
      <rect x="30" y="30" width="200" height="150" rx="8" fill="rgba(6,78,59,0.3)" stroke="#34d399" stroke-width="1.5"/>
      <text x="130" y="60" text-anchor="middle" fill="#34d399" font-size="14" font-weight="700">🔓 无锁</text>
      <text x="130" y="82" text-anchor="middle" fill="#94a3b8" font-size="10">Mark Word: 001</text>
      <text x="130" y="102" text-anchor="middle" fill="#94a3b8" font-size="9">unused:25 | hash:31</text>
      <text x="130" y="118" text-anchor="middle" fill="#94a3b8" font-size="9">| unused | age | 001</text>
      <text x="130" y="140" text-anchor="middle" fill="#64748b" font-size="9">新建对象的初始状态</text>

      <!-- Arrow -->
      <line x1="230" y1="105" x2="285" y2="105" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
      <text x="257" y="95" text-anchor="middle" fill="#fbbf24" font-size="9">线程A首次</text>
      <text x="257" y="120" text-anchor="middle" fill="#fbbf24" font-size="9">访问同步块</text>

      <!-- Biased lock -->
      <rect x="290" y="30" width="220" height="150" rx="8" fill="rgba(30,58,138,0.3)" stroke="#60a5fa" stroke-width="1.5"/>
      <text x="400" y="60" text-anchor="middle" fill="#60a5fa" font-size="14" font-weight="700">🔹 偏向锁</text>
      <text x="400" y="82" text-anchor="middle" fill="#94a3b8" font-size="10">Mark Word: 101</text>
      <text x="400" y="102" text-anchor="middle" fill="#94a3b8" font-size="9">thread_id:54 | epoch:2</text>
      <text x="400" y="118" text-anchor="middle" fill="#94a3b8" font-size="9">| age | 101</text>
      <text x="400" y="140" text-anchor="middle" fill="#64748b" font-size="9">线程A再进→直接通行 ✅</text>

      <!-- Arrow -->
      <line x1="510" y1="105" x2="565" y2="105" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
      <text x="537" y="95" text-anchor="middle" fill="#fbbf24" font-size="9">线程B</text>
      <text x="537" y="120" text-anchor="middle" fill="#fbbf24" font-size="9">也来竞争</text>

      <!-- Lightweight lock -->
      <rect x="570" y="30" width="230" height="150" rx="8" fill="rgba(120,53,15,0.3)" stroke="#fb923c" stroke-width="1.5"/>
      <text x="685" y="60" text-anchor="middle" fill="#fb923c" font-size="14" font-weight="700">🔸 轻量级锁</text>
      <text x="685" y="82" text-anchor="middle" fill="#94a3b8" font-size="10">Mark Word: 00</text>
      <text x="685" y="102" text-anchor="middle" fill="#94a3b8" font-size="9">指向栈中 Lock Record</text>
      <text x="685" y="118" text-anchor="middle" fill="#94a3b8" font-size="9">的指针 | 00</text>
      <text x="685" y="140" text-anchor="middle" fill="#64748b" font-size="9">CAS 争夺 · 自旋等待 🔄</text>

      <!-- Arrow -->
      <line x1="800" y1="105" x2="860" y2="105" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
      <text x="830" y="95" text-anchor="middle" fill="#fbbf24" font-size="9">自旋超时</text>
      <text x="830" y="120" text-anchor="middle" fill="#fbbf24" font-size="9">竞争激烈</text>

      <!-- Heavyweight lock -->
      <rect x="865" y="-10" width="175" height="200" rx="8" fill="rgba(136,19,55,0.4)" stroke="#fb7185" stroke-width="2"/>
      <text x="952" y="30" text-anchor="middle" fill="#fb7185" font-size="16" font-weight="700">🔒 重量级锁</text>
      <text x="952" y="55" text-anchor="middle" fill="#94a3b8" font-size="10">Mark Word: 10</text>
      <text x="952" y="75" text-anchor="middle" fill="#94a3b8" font-size="9">指向 ObjectMonitor</text>
      <text x="952" y="91" text-anchor="middle" fill="#94a3b8" font-size="9">的指针 | 10</text>
      <text x="952" y="115" text-anchor="middle" fill="#94a3b8" font-size="9">膨胀为 ObjectMonitor</text>
      <text x="952" y="135" text-anchor="middle" fill="#94a3b8" font-size="9">未抢到的进入</text>
      <text x="952" y="151" text-anchor="middle" fill="#94a3b8" font-size="9">EntryList 阻塞</text>
      <text x="952" y="171" text-anchor="middle" fill="#64748b" font-size="9">靠 OS mutex</text>

      <!-- Arrow marker -->
      <defs>
        <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
          <path d="M0,0 L8,3 L0,6 Z" fill="#64748b"/>
        </marker>
      </defs>

      <!-- Bottom section: why upgrade -->
      <rect x="30" y="210" width="1010" height="170" rx="8" fill="rgba(30,41,59,0.4)" stroke="#334155" stroke-width="1"/>
      <text x="535" y="242" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="700">💡 为什么需要锁升级？</text>
      <text x="535" y="268" text-anchor="middle" fill="#94a3b8" font-size="11">大多数场景下锁竞争并不激烈，直接用重量级锁（OS mutex）的上下文切换开销是浪费</text>
      <text x="535" y="292" text-anchor="middle" fill="#e2e8f0" font-size="11">偏向锁：假设只有一个线程用锁 → 几乎零开销</text>
      <text x="535" y="312" text-anchor="middle" fill="#e2e8f0" font-size="11">轻量级锁：有竞争但锁持有时间短 → CAS 自旋，不用挂起线程</text>
      <text x="535" y="332" text-anchor="middle" fill="#e2e8f0" font-size="11">重量级锁：竞争激烈或锁持有时间长 → 挂起线程，让出 CPU（但上下文切换开销大）</text>
      <text x="535" y="358" text-anchor="middle" fill="#64748b" font-size="10">JDK 1.6 默认开启偏向锁（启动后延迟 4 秒） · 可用 -XX:BiasedLockingStartupDelay=0 立即启用</text>
    </svg>
  </div>

  <!-- Mark Word detail -->
  <div class="card">
    <div class="card-title">🧬 Mark Word 详细布局（64位 JVM）</div>
    <svg viewBox="0 0 1060 300">
      <rect width="1060" height="300" fill="#0f172a" rx="8"/>
      <pattern id="grid2" width="40" height="40" patternUnits="userSpaceOnUse">
        <path d="M40 0L0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
      </pattern>
      <rect width="1060" height="300" fill="url(#grid2)"/>

      <!-- Row 1: No lock -->
      <text x="30" y="45" fill="#34d399" font-size="13" font-weight="700">无锁 (001)</text>
      <rect x="130" y="28" width="900" height="30" rx="4" fill="#0f172a" stroke="#334155" stroke-width="1"/>
      <rect x="130" y="28" width="370" height="30" rx="4" fill="rgba(6,78,59,0.2)" stroke="#34d399" stroke-width="0.5"/>
      <text x="315" y="48" text-anchor="middle" fill="#94a3b8" font-size="10">unused:25 bits</text>
      <rect x="500" y="28" width="438" height="30" rx="4" fill="rgba(6,78,59,0.15)" stroke="#34d399" stroke-width="0.5"/>
      <text x="719" y="48" text-anchor="middle" fill="#94a3b8" font-size="10">identity_hashcode:31 bits</text>
      <rect x="938" y="28" width="40" height="30" rx="4" fill="rgba(6,78,59,0.15)" stroke="#34d399" stroke-width="0.5"/>
      <text x="958" y="48" text-anchor="middle" fill="#94a3b8" font-size="9">unused:1</text>
      <rect x="978" y="28" width="24" height="30" rx="4" fill="rgba(6,78,59,0.15)" stroke="#34d399" stroke-width="0.5"/>
      <text x="990" y="48" text-anchor="middle" fill="#94a3b8" font-size="8">age:4</text>
      <rect x="1002" y="28" width="28" height="30" rx="4" fill="#34d399" stroke="#34d399" stroke-width="1"/>
      <text x="1016" y="48" text-anchor="middle" fill="#fff" font-size="9" font-weight="700">001</text>

      <!-- Row 2: Biased -->
      <text x="30" y="105" fill="#60a5fa" font-size="13" font-weight="700">偏向锁 (101)</text>
      <rect x="130" y="88" width="900" height="30" rx="4" fill="#0f172a" stroke="#334155" stroke-width="1"/>
      <rect x="130" y="88" width="750" height="30" rx="4" fill="rgba(30,58,138,0.2)" stroke="#60a5fa" stroke-width="0.5"/>
      <text x="505" y="108" text-anchor="middle" fill="#94a3b8" font-size="10">thread_id:54 bits</text>
      <rect x="880" y="88" width="30" height="30" rx="4" fill="rgba(30,58,138,0.15)" stroke="#60a5fa" stroke-width="0.5"/>
      <text x="895" y="108" text-anchor="middle" fill="#94a3b8" font-size="9">epoch:2</text>
      <rect x="910" y="88" width="70" height="30" rx="4" fill="rgba(30,58,138,0.15)" stroke="#60a5fa" stroke-width="0.5"/>
      <text x="945" y="108" text-anchor="middle" fill="#94a3b8" font-size="9">unused:1 | age:4</text>
      <rect x="980" y="88" width="28" height="30" rx="4" fill="#60a5fa" stroke="#60a5fa" stroke-width="1"/>
      <text x="994" y="108" text-anchor="middle" fill="#fff" font-size="9" font-weight="700">101</text>

      <!-- Row 3: Lightweight -->
      <text x="30" y="165" fill="#fb923c" font-size="13" font-weight="700">轻量级锁 (00)</text>
      <rect x="130" y="148" width="900" height="30" rx="4" fill="#0f172a" stroke="#334155" stroke-width="1"/>
      <rect x="130" y="148" width="870" height="30" rx="4" fill="rgba(120,53,15,0.2)" stroke="#fb923c" stroke-width="0.5"/>
      <text x="565" y="168" text-anchor="middle" fill="#94a3b8" font-size="10">ptr_to_lock_record:62 bits (指向栈中 Lock Record 的指针)</text>
      <rect x="1000" y="148" width="30" height="30" rx="4" fill="#fb923c" stroke="#fb923c" stroke-width="1"/>
      <text x="1015" y="168" text-anchor="middle" fill="#fff" font-size="9" font-weight="700">00</text>

      <!-- Row 4: Heavyweight -->
      <text x="30" y="225" fill="#fb7185" font-size="13" font-weight="700">重量级锁 (10)</text>
      <rect x="130" y="208" width="900" height="30" rx="4" fill="#0f172a" stroke="#334155" stroke-width="1"/>
      <rect x="130" y="208" width="870" height="30" rx="4" fill="rgba(136,19,55,0.2)" stroke="#fb7185" stroke-width="0.5"/>
      <text x="565" y="228" text-anchor="middle" fill="#94a3b8" font-size="10">ptr_to_ObjectMonitor:62 bits (指向 ObjectMonitor 的指针)</text>
      <rect x="1000" y="208" width="30" height="30" rx="4" fill="#fb7185" stroke="#fb7185" stroke-width="1"/>
      <text x="1015" y="228" text-anchor="middle" fill="#fff" font-size="9" font-weight="700">10</text>

      <!-- Footer -->
      <text x="535" y="280" text-anchor="middle" fill="#64748b" font-size="10">每个 Java 对象在堆内存中都有一个 Mark Word · 32位 JVM 布局类似但字段宽度不同</text>
    </svg>
  </div>
</div>
</body>
</html>
